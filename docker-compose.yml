# ─────────────────────────────────────────────────────────────────────────────
# ForkCart Docker Compose Configuration
#
# SECURITY NOTE (RVS-029): All internal ports are bound to 127.0.0.1 to prevent
# direct external access. This is CRITICAL for security:
#   - Database: Never expose PostgreSQL to the internet directly
#   - API: Should be accessed through a reverse proxy (Caddy, nginx, etc.)
#   - Admin: Internal admin panel should not be publicly accessible
#
# For production, use a reverse proxy with HTTPS termination.
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:16-alpine
    container_name: forkcart-db
    restart: unless-stopped
    environment:
      # RVS-015: Database credentials MUST be changed in production!
      POSTGRES_USER: ${POSTGRES_USER:-forkcart}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-forkcart}
    ports:
      # RVS-029: Bind to 127.0.0.1 only — never expose DB to the internet!
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forkcart']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: forkcart-api
    restart: unless-stopped
    ports:
      # RVS-029: Bind to localhost — use reverse proxy for public access
      - '127.0.0.1:4000:4000'
    environment:
      # RVS-015: Database URL uses credentials from env vars
      DATABASE_URL: postgresql://${POSTGRES_USER:-forkcart}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-forkcart}
      API_PORT: '4000'
      API_HOST: '0.0.0.0'
      # RVS-014: Session secret MUST be set via env var
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET must be set}
      LOG_LEVEL: '${LOG_LEVEL:-info}'
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
    container_name: forkcart-admin
    restart: unless-stopped
    ports:
      # RVS-029: Bind to localhost — admin panel should never be publicly accessible without auth proxy
      - '127.0.0.1:3001:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://api:4000
    depends_on:
      - api

  storefront:
    build:
      context: .
      dockerfile: packages/storefront/Dockerfile
    container_name: forkcart-storefront
    restart: unless-stopped
    ports:
      # NOTE: Storefront is intentionally bound to 0.0.0.0 for direct public access,
      # OR use 127.0.0.1 if behind a reverse proxy. Adjust as needed.
      - '127.0.0.1:3000:3000'
    environment:
      NEXT_PUBLIC_STOREFRONT_API_URL: http://api:4000
    depends_on:
      - api

volumes:
  postgres_data:
